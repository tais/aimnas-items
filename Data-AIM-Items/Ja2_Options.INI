;==============================================================================
; AIMNAS-Items overlay - MINIMAL item-system override for Ja2_Options.INI
;==============================================================================
; This file is KEY-MERGED on top of the stock JA2 1.13 Ja2_Options.INI
; (MERGE_INI_FILES = Ja2_Options.ini in Ja2.ini). Only the keys below are
; overridden; EVERYTHING ELSE falls through to original 1.13 values.
;
; Why only these three keys:
;   AIMNAS items use a fine-grained item-size scale (sizes up to 949). The stock
;   1.13 caps (MAX_ITEM_SIZE=34, MAX_WEAPON_SIZE=9, OLD_INVENTORY_ITEM_NUMBER=99)
;   would clamp/corrupt almost every AIMNAS item's bulk/weight. These three caps
;   are the only configuration AIMNAS items strictly REQUIRE.
;
; Deliberately NOT overridden (left at original 1.13 values), to keep the
; original campaign feel on the original-sized maps:
;   - NCTH stays at the 1.13 default (AIMNAS weapons carry full legacy/OCTH
;     accuracy data, so they work fine without the New CtH system). If you
;     prefer AIMNAS's designed accuracy model, set NCTH = TRUE here AND copy
;     AIMNAS's CTHConstants.ini into this folder.
;   - INITIAL_MERC_ARRIVAL_LOCATION (stays 4870 = Omerta A9, NOT the bigmap 63775)
;   - USE_XML_TILESETS, sight/vision ranges, garrison sizes, strategic/economy,
;     IMP/recruitment, difficulty, weather, UI - all original 1.13.
;   - Item COUNT needs no key: 1.13 derives it from the number of <ITEM> records.
;==============================================================================

[System Limit Settings]
MAX_ITEM_SIZE = 949
MAX_WEAPON_SIZE = 599
OLD_INVENTORY_ITEM_NUMBER = 1000
